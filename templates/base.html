{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="cyber" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#08080f">
  <title>{% block title %}Gym Tracker{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="manifest" href="{% static 'manifest.json' %}">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <div id="offline-banner">You are offline — logs will sync when connected.</div>

  <nav class="nav">
    <a href="/" class="nav-logo">💪 GymTracker</a>
    <div class="nav-links">
      <a href="/" class="{% block nav_home %}{% endblock %}">🏠 <span>Home</span></a>
      <a href="/dashboard/" class="{% block nav_dash %}{% endblock %}">📊 <span>Dashboard</span></a>
      <a href="/settings/" class="{% block nav_settings %}{% endblock %}">⚙️ <span>Settings</span></a>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <script src="{% static 'js/app.js' %}"></script>
  <script>
    (function() {
      var saved = localStorage.getItem('theme') || '{{ theme|default:"cyber" }}';
      document.getElementById('html-root').setAttribute('data-theme', saved);
    })();
  </script>
</body>
</html>
